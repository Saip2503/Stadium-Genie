name: stadium_genie
description: "StadiumGenie - FIFA 2026 Smart Stadium GenAI Assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # GenAI
  google_generative_ai: ^0.4.6

  # Environment / Secrets
  flutter_dotenv: ^5.2.1

  # HTTP
  http: ^1.2.2

  # Animations
  flutter_animate: ^4.5.0

  # Persistence
  shared_preferences: ^2.3.3

  # Firebase & Auth
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/data/stadium_status.json
    - assets/images/stadium.png
    - assets/images/stadium_map.png
    - assets/images/stadium_concourse.png
    - assets/images/app_logo.png
    - .env
